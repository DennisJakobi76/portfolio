name: Portfolio veröffentlichen

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: portfolio-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Angular bauen und zu IONOS übertragen
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Angular-Anwendung bauen
        run: npm run build

      - name: Build-Ausgabe prüfen
        run: |
          test -f dist/Portfolio/browser/index.html
          ls -la dist/Portfolio/browser

      - name: Portfolio per SFTP veröffentlichen
        uses: wangyucode/sftp-upload-action@v3
        with:
          host: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USERNAME }}
          password: ${{ secrets.IONOS_PASSWORD }}
          port: 22
          localDir: dist/Portfolio/browser
          remoteDir: /
          forceUpload: true
          removeExtraFilesOnServer: false
